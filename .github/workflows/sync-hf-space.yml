name: Sync to HF Space

on:
  push:
    branches: [main]
    paths:
      - 'hf_space/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push hf_space/ to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git clone https://Nanni59:$HF_TOKEN@huggingface.co/spaces/Nanni59/manim-renderer hf_repo
          cp -r hf_space/. hf_repo/
          cd hf_repo
          git add -A
          git diff --staged --quiet || git commit -m "Sync from GitHub (${{ github.sha }})"
          git push
